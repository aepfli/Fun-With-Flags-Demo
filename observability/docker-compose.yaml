services:
  lgtm:
    image: grafana/otel-lgtm:latest
    container_name: fun-with-flags-lgtm
    ports:
      - "3000:3000"     # Grafana UI (admin/admin)
      - "4317:4317"     # OTLP gRPC (every language's exporter points here)
      - "4318:4318"     # OTLP HTTP
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    # Import the prebuilt dashboard via volume. The base image provisions
    # anything under /otel-lgtm/grafana/dashboards/.
    volumes:
      - ./dashboards:/otel-lgtm/grafana/dashboards:ro
