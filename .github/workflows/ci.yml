name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit arrives on the same PR/branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java-spring:
    name: java-spring
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-spring
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Compile
        run: ./mvnw -B -q compile test-compile
      - name: Test (Testcontainers)
        run: ./mvnw -B verify

  java-quarkus:
    name: java-quarkus
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-quarkus
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven
      - name: Compile
        run: ./mvnw -B -q clean compile test-compile
      - name: Test (Testcontainers)
        run: ./mvnw -B verify

  go-chi:
    name: go-chi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-chi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache-dependency-path: go-chi/go.sum
      - name: Build + vet
        run: |
          go build ./...
          go vet ./...
      - name: Test (Testcontainers)
        run: go test ./...

  python-fastapi:
    name: python-fastapi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-fastapi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Import check
        run: python -c "from app.main import app; print('ok:', app)"
      - name: Test (Testcontainers)
        run: pytest -v

  node-express:
    name: node-express
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-express
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node-express/package-lock.json
      - name: Install
        run: npm ci
      - name: Syntax check
        run: node --check src/index.js src/openfeature.js src/middleware.js src/hook.js
      - name: Test (Testcontainers)
        run: npm test
